



<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>저축 & 투자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f59e0b;
    --gold-soft: #fffbeb;
    --gold-mid: #fde68a;
    --green: #10b981;
    --green-soft: #f0fdf4;
    --green-mid: #a7f3d0;
    --blue: #3b82f6;
    --blue-soft: #eff6ff;
    --blue-mid: #bfdbfe;
    --red: #ef4444;
    --red-soft: #fef2f2;
    --purple: #8b5cf6;
    --purple-soft: #f5f3ff;
    --purple-mid: #ddd6fe;
    --red: #ef4444;
    --red-soft: #fef2f2;
    --surface: #ffffff;
    --border: #ede8d8;
    --text: #1c1a0f;
    --text2: #8a8270;
    --text3: #c4bda8;
    --shadow: 0 2px 20px rgba(120,100,40,0.08);
    --shadow-hover: 0 8px 32px rgba(120,100,40,0.14);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 5% 20%, #fef9e7 0%, transparent 30%),
      radial-gradient(circle at 95% 80%, #f0fdf4 0%, transparent 30%);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 80px;
  }

  header { max-width: 860px; margin: 0 auto 28px; text-align: center; }
  .header-emoji { font-size: 36px; margin-bottom: 8px; }
  header h1 { font-family: 'Gowun Dodum', sans-serif; font-size: 26px; letter-spacing: -0.3px; margin-bottom: 4px; }

  .header-nav { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 99px; padding: 7px 16px;
    font-size: 10px; font-weight: 700; color: var(--text2);
    text-decoration: none; box-shadow: var(--shadow); transition: all 0.15s; cursor: pointer;
    font-family: inherit;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }

  .section-title {
    max-width: 860px; margin: 0 auto 12px;
    font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text2);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Summary ── */
  .summary-grid {
    max-width: 860px; margin: 0 auto 24px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .sum-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; border: 1.5px solid var(--border);
    box-shadow: var(--shadow); text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .sum-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .sum-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 6px; }
  .sum-amount { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  .sum-sub { font-size: 10px; color: var(--text2); margin-top: 4px; }
  .sum-card.savings .sum-amount { color: var(--green); }
  .sum-card.invest .sum-amount { color: var(--blue); }
  .sum-card.total { background: linear-gradient(135deg, #fffbeb, #fef3c7); border-color: var(--gold-mid); }
  .sum-card.total .sum-amount { color: var(--gold); font-size: 24px; }

  /* ── Goals ── */
  .goals-section {
    max-width: 860px; margin: 0 auto 24px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow);
  }
  .goals-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .goals-header h3 { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
  .add-goal-btn {
    font-size: 10px; font-weight: 700; background: var(--gold-soft);
    border: 1.5px solid var(--gold-mid); border-radius: 99px;
    padding: 5px 14px; cursor: pointer; color: var(--gold);
    font-family: inherit; transition: all 0.15s;
  }
  .add-goal-btn:hover { background: var(--gold); color: #fff; }

  .goals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .goal-card {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 16px;
    transition: all 0.18s; position: relative;
  }
  .goal-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .goal-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .goal-emoji { font-size: 22px; }
  .goal-name { font-size: 14px; font-weight: 700; flex: 1; }
  .goal-pct { font-size: 12px; font-weight: 900; color: var(--gold); }
  .goal-amounts { display: flex; justify-content: space-between; font-size: 10px; color: var(--text2); margin-bottom: 8px; }
  .goal-amounts strong { color: var(--text); font-weight: 700; }
  .goal-bar-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
  .goal-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 45%, #34d399 100%); transition: width 0.6s cubic-bezier(0.34,1.1,0.64,1); }
  .goal-bar-fill.done { background: linear-gradient(90deg, var(--green), #34d399); }
  .goal-remaining { font-size: 10px; color: var(--text3); }
  .goal-deadline { font-size: 10px; margin-top: 6px; color: var(--text2); }
  .goal-eta { font-size: 10px; margin-top: 3px; color: var(--text3); }
  .goal-actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .goal-action-btn{
    font-size:11px;font-weight:600;border-radius:7px;
    padding:5px 9px;cursor:pointer;font-family:inherit;
    border:1.2px solid transparent;min-height:30px;
    display:flex;align-items:center;justify-content:center;
  }
  .goal-edit-btn {
    font-size: 10px; font-weight: 700; background: var(--purple-soft);
    border: 1.5px solid var(--purple-mid); border-radius: 8px;
    padding: 4px 10px; cursor: pointer; color: var(--purple);
    font-family: inherit; transition: all 0.15s;
  }
  .goal-edit-btn:hover { background: var(--purple); color: #fff; }
  .goal-eta { font-size: 10px; margin-top: 3px; color: var(--text3); }
  .goal-del {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; display:flex; align-items:center; justify-content:center;
    background: #fff; border: 1px solid #fecaca; color: var(--red); cursor: pointer;
    font-size: 14px; padding: 0; border-radius: 8px; transition: all 0.15s;
  }
  .goal-del:hover { background: var(--red-soft); color: var(--red); }
  .goal-add-btn {
    font-size: 10px; font-weight: 700; background: var(--green-soft);
    border: 1.5px solid var(--green-mid); border-radius: 8px;
    padding: 4px 10px; cursor: pointer; color: var(--green);
    font-family: inherit; transition: all 0.15s; margin-top: 4px;
  }
  .goal-add-btn:hover { background: var(--green); color: #fff; }
  .goals-empty { font-size: 12px; color: var(--text3); text-align: center; padding: 20px; }

  /* ── Monthly savings target ── */
  .monthly-section {
    max-width: 860px; margin: 0 auto 24px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow);
  }
  .monthly-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .monthly-header h3 { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }

  .month-nav {
    display: inline-flex; align-items: center; gap: 14px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 99px; padding: 6px 16px;
  }
  .month-nav button { background: none; border: none; color: var(--text2); font-size: 15px; cursor: pointer; padding: 2px 6px; border-radius: 50%; transition: all 0.15s; }
  .month-nav button:hover { background: var(--border); color: var(--text); }
  .month-nav span { font-size: 14px; font-weight: 700; min-width: 80px; text-align: center; }

  .monthly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .monthly-item { }
  .monthly-item-label { font-size: 10px; color: var(--text2); font-weight: 700; letter-spacing: 0.04em; margin-bottom: 8px; text-transform: uppercase; }
  .monthly-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .monthly-input {
    flex: 1; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); padding: 9px 12px;
    font-size: 14px; font-family: 'Noto Sans KR', monospace; font-weight: 700; outline: none;
    transition: border-color 0.15s;
  }
  .monthly-input:focus { border-color: var(--gold); }
  .monthly-save-btn {
    background: var(--gold); color: #fff; border: none; border-radius: 10px;
    padding: 9px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .monthly-save-btn:hover { opacity: 0.85; }
  .monthly-progress { }
  .monthly-progress-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .monthly-progress-header .saved { font-weight: 800; color: var(--green); }
  .monthly-progress-header .target { color: var(--text2); }
  .monthly-bar-track { height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .monthly-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .monthly-bar-fill.savings { background: linear-gradient(90deg, var(--green), #6ee7b7); }
  .monthly-bar-fill.invest { background: linear-gradient(90deg, var(--blue), #93c5fd); }
  .monthly-pct-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* ── Portfolio ── */
  .portfolio-section {
    max-width: 860px; margin: 0 auto 24px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow);
  }
  .portfolio-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .portfolio-header h3 { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
  .add-portfolio-btn {
    font-size: 12px; font-weight: 700; background: var(--blue-soft);
    border: 1.5px solid var(--blue-mid); border-radius: 99px;
    padding: 5px 14px; cursor: pointer; color: var(--blue);
    font-family: inherit; transition: all 0.15s;
  }
  .add-portfolio-btn:hover { background: var(--blue); color: #fff; }

  .portfolio-list { display: flex; flex-direction: column; gap: 8px; }
  .portfolio-row {
    display: grid; grid-template-columns: 36px 1fr 110px 90px 80px 32px;
    align-items: center; gap: 10px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px 14px; transition: all 0.15s;
  }
  .portfolio-row:hover { border-color: var(--blue-mid); }
  .portfolio-type { font-size: 18px; text-align: center; }
  .portfolio-name { font-size: 12px; font-weight: 700; }
  .portfolio-sub { font-size: 10px; color: var(--text2); margin-top: 1px; }
  .portfolio-amount { font-size: 14px; font-weight: 800; color: var(--blue); text-align: right; }
  .portfolio-input {
    background: var(--surface); border: 1.5px solid var(--blue-mid);
    border-radius: 8px; color: var(--text); padding: 5px 8px;
    font-size: 12px; font-family: inherit; font-weight: 700; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  .portfolio-input:focus { border-color: var(--blue); }
  .portfolio-gain {
    font-size: 12px; font-weight: 700; text-align: right;
    padding: 3px 8px; border-radius: 6px;
  }
  .portfolio-gain.pos { color: var(--green); background: var(--green-soft); }
  .portfolio-gain.neg { color: var(--red); background: var(--red-soft); }
  .portfolio-gain.neu { color: var(--text3); background: var(--bg); }
  .p-del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 3px 5px; border-radius: 6px; transition: all 0.15s; }
  .p-del-btn:hover { color: var(--red); background: var(--red-soft); }
  .portfolio-empty { font-size: 12px; color: var(--text3); text-align: center; padding: 24px; }

  /* ── History chart ── */
  .chart-section {
    max-width: 860px; margin: 0 auto 24px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow);
  }
  .chart-section h3 { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); margin-bottom: 20px; }
  .chart-inner { display: flex; align-items: flex-end; gap: 6px; height: 150px; border-bottom: 1.5px solid var(--border); padding-bottom: 28px; overflow-x: auto; }
  .chart-col { flex: 0 0 auto; width: 56px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
  .chart-col-bars { width: 100%; display: flex; gap: 3px; align-items: flex-end; justify-content: center; flex: 1; }
  .chart-bar-s { width: 44%; border-radius: 4px 4px 0 0; background: linear-gradient(180deg, #6ee7b7, var(--green)); min-height: 2px; cursor: default; transition: height 0.5s ease; }
  .chart-bar-i { width: 44%; border-radius: 4px 4px 0 0; background: linear-gradient(180deg, #93c5fd, var(--blue)); min-height: 2px; cursor: default; transition: height 0.5s ease; }
  .chart-mlabel { position: absolute; bottom: -22px; font-size: 9px; color: var(--text3); font-weight: 600; white-space: nowrap; left: 50%; transform: translateX(-50%); }
  .chart-col.cur .chart-mlabel { color: var(--gold); font-weight: 800; }
  .chart-legend { display: flex; gap: 14px; margin-top: 14px; }
  .chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text2); }
  .chart-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ── Modals ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 28px; width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .modal-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .modal-row label { font-size: 10px; color: var(--text2); font-weight: 700; letter-spacing: 0.04em; }
  .modal-row input, .modal-row select {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); padding: 9px 12px;
    font-size: 12px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  .modal-row input:focus, .modal-row select:focus { border-color: var(--gold); }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .modal-btns button { padding: 9px 20px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; }
  .btn-cancel { background: var(--bg); color: var(--text2); border: 1.5px solid var(--border) !important; }
  .btn-save-gold { background: linear-gradient(135deg, var(--gold), #fbbf24); color: #fff; }
  .btn-save-blue { background: linear-gradient(135deg, var(--blue), #60a5fa); color: #fff; }

  /* ── Goal deposit modal ── */
  .deposit-modal { width: 340px; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1c1a0f; color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 12px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1); z-index: 1000; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  #chart-tip { position: fixed; background: #1c1a0f; color: #fff; font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 8px; white-space: nowrap; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.12s; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  #chart-tip.show { opacity: 1; }

  @media (max-width: 640px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .goals-grid { grid-template-columns: 1fr; }
    .monthly-grid { grid-template-columns: 1fr; }
    .portfolio-row { grid-template-columns: 30px 1fr 90px 32px; }
    .portfolio-row .portfolio-gain, .portfolio-row .portfolio-input { display: none; }
  }

  input, select, textarea, button { font-size: 16px !important; }
  input, select, button { min-height: 44px; }
  input[type="number"] { font-size: 16px; }

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <div class="header-emoji">💎</div>
  <h1>저축 & 투자</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="month-title"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="header-nav">
    <a href="living.html" class="nav-btn">🏠 생활비 정산</a>
    <a href="index.html" class="nav-btn">💳 개인 지출</a>
  </div>
</header>

<!-- Summary -->
<div class="section-title">전체 현황</div>
<div class="summary-grid">
  <div class="sum-card savings">
    <div class="sum-label">총 저축</div>
    <div class="sum-amount" id="total-savings">¥0</div>
    <div class="sum-sub" id="savings-goal-sub">목표 미설정</div>
  </div>
  <div class="sum-card invest">
    <div class="sum-label">총 투자</div>
    <div class="sum-amount" id="total-invest">¥0</div>
    <div class="sum-sub" id="invest-count">0개 종목</div>
  </div>
  <div class="sum-card total">
    <div class="sum-label">💎 순자산</div>
    <div class="sum-amount" id="net-worth">¥0</div>
    <div class="sum-sub">저축 + 투자</div>
  </div>
</div>

<!-- Goals -->
<div class="section-title">🎯 저축 목표</div>
<div class="goals-section">
  <div class="goals-header">
    <h3>목표별 현황</h3>
    <button class="add-goal-btn" onclick="openGoalModal()">+ 목표 추가</button>
  </div>
  <div class="goals-grid" id="goals-grid"></div>
</div>

<!-- Monthly -->
<div class="section-title">📅 이달 저축 & 투자</div>
<div class="monthly-section">
  <div class="monthly-header">
    <h3>월별 달성률</h3>
    <button class="nav-btn" onclick="openTargetModal()" style="font-size:11px;padding:5px 12px">⚙️ 월 목표 설정</button>
  </div>
  <!-- 목표별 저축 입력 -->
  <div id="monthly-goals-area"></div>
  <!-- 투자 -->
  <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
    <div class="monthly-item-label" style="margin-bottom:10px">💙 이달 투자</div>
    <div class="monthly-input-row">
      <input class="monthly-input" type="number" id="m-invest-actual" placeholder="이달 투자액" min="0">
      <button class="monthly-save-btn" style="background:var(--blue)" onclick="saveMonthlyInvest()">저장</button>
    </div>
    <div class="monthly-progress">
      <div class="monthly-progress-header">
        <span class="saved" id="m-invest-saved" style="color:var(--blue)">¥0</span>
        <span class="target">목표 <span id="m-invest-target">미설정</span></span>
      </div>
      <div class="monthly-bar-track">
        <div class="monthly-bar-fill invest" id="m-invest-bar" style="width:0%"></div>
      </div>
      <div class="monthly-pct-label" id="m-invest-pct"></div>
    </div>
  </div>
</div>

<!-- Portfolio -->
<div class="section-title">📈 투자 포트폴리오</div>
<div class="portfolio-section">
  <div class="portfolio-header">
    <h3>종목별 현황</h3>
    <button class="add-portfolio-btn" onclick="openPortfolioModal()">+ 종목 추가</button>
  </div>
  <div class="portfolio-list" id="portfolio-list"></div>
</div>

<!-- History chart -->
<div class="section-title">📊 저축/투자 히스토리</div>
<div class="chart-section">
  <h3>월별 저축 & 투자 추이</h3>
  <div class="chart-inner" id="chart-inner"></div>
  <div class="chart-legend">
    <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--green)"></div>저축</div>

<script>
const SUPABASE_URL = 'https://plmzikgawehuegvbdcpx.supabase.co';

// ── Storage (goals/portfolio/targets only) ──
function getGoals()       { return JSON.parse(localStorage.getItem('si_goals') || '[]'); }

function fmt(n) { return '¥' + Math.abs(Math.round(Number(n || 0))).toLocaleString('ja-JP'); }
function monthKey(y = currentYear, m = currentMonth) { return `${y}-${String(m+1).padStart(2,'0')}`; }


function formatDeadline(deadline) {
  if (!deadline) return '';
  const [y, m] = deadline.split('-');
  if (!y || !m) return '';
  return `${y}년 ${Number(m)}월`;
}
function monthsUntilDeadline(deadline) {
  if (!deadline) return null;
  const [y, m] = deadline.split('-').map(Number);
  if (!y || !m) return null;
  return (y - currentYear) * 12 + (m - (currentMonth + 1));
}
function estimateCompletionMonth(saved, target, monthly) {
  if (!monthly || monthly <= 0) return '';
  const remaining = Math.max(0, target - saved);
  if (remaining <= 0) return '예상 달성: 달성 완료';
  const monthsNeeded = Math.ceil(remaining / monthly);
  const base = new Date(currentYear, currentMonth, 1);
  base.setMonth(base.getMonth() + monthsNeeded);
  return `예상 달성: ${base.getFullYear()}년 ${base.getMonth() + 1}월`;
}

function initDate() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
}
async function changeMonth(d) {
  currentMonth += d;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  await render();
}

async function fetchSavingsRows() {
  const { data, error } = await supabaseClient
    .from('savings')
    .select('id, month, type, category, amount, memo, synced, personal_tx_id, created_at')
    .order('created_at', { ascending: false });
  if (error) {
    console.error('fetchSavingsRows error:', error);
    showToast('저축 데이터를 불러오지 못했어요');
    return;
  }
  savingsRows = data || [];
}

function rowsForMonth(y = currentYear, m = currentMonth) {
  return savingsRows.filter(r => r.month === monthKey(y, m));
}
function getMonthlyData(y = currentYear, m = currentMonth) {
  const rows = rowsForMonth(y, m);
  return {
    savings: rows.filter(r => r.type === 'saving').reduce((s, r) => s + Number(r.amount || 0), 0),
    invest: rows.filter(r => r.type === 'investment').reduce((s, r) => s + Number(r.amount || 0), 0)
  };
}
function getGoalSaved(goalId) {
  return savingsRows
    .filter(r => r.type === 'saving' && typeof r.memo === 'string' && r.memo.startsWith(`goal:${goalId}:`))
    .reduce((s, r) => s + Number(r.amount || 0), 0);
}
function getGoalMonthlyData(goalId) {
  return rowsForMonth()
    .filter(r => r.type === 'saving' && typeof r.memo === 'string' && r.memo.startsWith(`goal:${goalId}:`))
    .reduce((s, r) => s + Number(r.amount || 0), 0);
}

async function insertSavingsRow(payload) {
  const { error } = await supabaseClient.from('savings').insert(payload);
  if (error) throw error;
}
async function syncToPersonalExpense(cat, amount, desc) {
  const today = new Date();
  const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const { error } = await supabaseClient.from('personal_transactions').insert({
    id: crypto.randomUUID(),
    date: dateStr,
    type: 'expense',
    category: cat,
    subcategory: null,
    amount,
    memo: desc,
    source: 'saving',
    source_id: null
  });
  if (error) throw error;
}

  const goal = getGoals().find(g => g.id === withdrawGoalId);

      memo: `goal:${goal.id}:${goal.name}:withdraw`,

    });

function renderSummary() {
  const goals = getGoals();
  const portfolio = getPortfolio();
  const totalSavings = savingsRows.filter(r => r.type === 'saving').reduce((s, r) => s + Number(r.amount || 0), 0);
  const dbInvest  = savingsRows.filter(r => r.type === 'investment').reduce((s, r) => s + Number(r.amount || 0), 0);
  const portfolioValue = portfolio.reduce((s, p) => s + (p.value || 0), 0);
  const totalInvest = portfolio.length ? portfolioValue : dbInvest;

  document.getElementById('total-savings').textContent = fmt(totalSavings);
  document.getElementById('total-invest').textContent = fmt(totalInvest);
  document.getElementById('net-worth').textContent = fmt(totalSavings + totalInvest);
  document.getElementById('invest-count').textContent = portfolio.length ? portfolio.length + '개 종목' : rowsForMonth().filter(r => r.type === 'investment').length + '건';

  const totalGoalTarget = goals.reduce((s, g) => s + g.target, 0);
  if (totalGoalTarget > 0) {
    const pct = Math.round(totalSavings / totalGoalTarget * 100);
    document.getElementById('savings-goal-sub').textContent = `목표 ${fmt(totalGoalTarget)} (${pct}%)`;
  } else {
    document.getElementById('savings-goal-sub').textContent = '목표 미설정';
  }
}

function renderGoals() {
  const goals = getGoals();
  const grid = document.getElementById('goals-grid');
  if (!goals.length) {
    grid.innerHTML = '<div class="goals-empty" style="grid-column:1/-1">목표를 추가해보세요</div>';
    return;
  }
  grid.innerHTML = goals.map(g => {
    const saved = getGoalSaved(g.id);
    const pct = Math.min(100, g.target > 0 ? Math.round(saved / g.target * 100) : 0);
    const done = pct >= 100;
    const remaining = Math.max(0, g.target - saved);
    const monthsLeft = g.monthly > 0 ? Math.ceil(remaining / g.monthly) : null;
    const deadlineDiff = monthsUntilDeadline(g.deadline);
    const deadlineText = formatDeadline(g.deadline);
    const deadlineMessage = deadlineText
      ? (deadlineDiff === null
          ? `기한 ${deadlineText}`
          : deadlineDiff < 0
            ? `기한 ${deadlineText} · 기한 지남`
            : `기한 ${deadlineText} · ${deadlineDiff}개월 남음`)
      : '';
    const etaText = estimateCompletionMonth(saved, g.target, g.monthly);
    return `
      <div class="goal-card">
        <div class="goal-top">
          <span class="goal-name">${g.name}</span>
          <span class="goal-pct" style="${done ? 'color:var(--green)' : ''}">${pct}%</span>
        </div>
        <div class="goal-amounts">
          <span>저축액 <strong>${fmt(saved)}</strong></span>
          <span>목표 <strong>${fmt(g.target)}</strong></span>
        </div>
        <div class="goal-bar-track">
          <div class="goal-bar-fill${done ? ' done' : ''}" style="width:${pct}%"></div>
        </div>
        <div class="goal-remaining">
          ${done ? '목표 달성!' : `남은 금액 ${fmt(remaining)}${monthsLeft ? ` · 약 ${monthsLeft}개월` : ''}`}
        </div>
        ${deadlineMessage ? `<div class="goal-deadline">${deadlineMessage}</div>` : ''}
        ${etaText ? `<div class="goal-eta">${etaText}</div>` : ''}
        <div class="goal-actions">
          <button class="goal-action-btn" style="background:#ecfdf5;border-color:#86efac;color:#059669" onclick="openDepositModal(${g.id})">+ 저축 추가</button>
          <button class="goal-action-btn" style="background:#fef2f2;border-color:#fca5a5;color:#dc2626" onclick="openWithdrawModal(${g.id})">− 인출</button>
          <button class="goal-action-btn" style="background:#f3f0ff;border-color:#c4b5fd;color:#6d28d9" onclick="openEditGoalModal(${g.id})">수정</button>
          <button class="goal-action-btn" style="background:#fff;border-color:#fecaca;color:#dc2626" onclick="deleteGoal(${g.id})">✕</button>
        </div>
      </div>`;
  }).join('');
}

            <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">
              <input class="monthly-input" type="number" id="goal-monthly-${g.id}" placeholder="추가할 금액" min="0">
              <button class="monthly-save-btn" onclick="saveGoalMonthly(${g.id})">+ 추가</button>
            </div>
          </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;font-size:12px;padding-top:10px;border-top:1px solid var(--border);margin-top:4px;">
        <span style="color:var(--text2)">이달 저축 합계</span>
        <span style="font-weight:800;color:var(--green)" id="m-savings-saved">${fmt(data.savings)}</span>
      </div>
    `;
  }

  document.getElementById('m-invest-actual').value = data.invest || '';
  const iTgt = targets.invest || 0;
  document.getElementById('m-invest-saved').textContent = fmt(data.invest || 0);
  document.getElementById('m-invest-target').textContent = iTgt ? fmt(iTgt) : '미설정';
  const iPct = iTgt > 0 ? Math.min(100, Math.round((data.invest || 0) / iTgt * 100)) : 0;
  document.getElementById('m-invest-bar').style.width = iPct + '%';
  document.getElementById('m-invest-pct').textContent = iTgt ? `${iPct}% 달성` : '';
}

function renderPortfolio() {
  const portfolio = getPortfolio();
  const container = document.getElementById('portfolio-list');
  if (!portfolio.length) {
    container.innerHTML = '<div class="portfolio-empty">종목을 추가해보세요 📈</div>';
    return;
  }
  container.innerHTML = portfolio.map(p => {
    const gain = p.value - p.cost;
    const gainPct = p.cost > 0 ? ((gain / p.cost) * 100).toFixed(1) : 0;
    const gainClass = gain > 0 ? 'pos' : gain < 0 ? 'neg' : 'neu';
    const gainStr = gain > 0 ? `+${fmt(gain)} (+${gainPct}%)` : gain < 0 ? `−${fmt(Math.abs(gain))} (${gainPct}%)` : '±0';
    const typeEmoji = p.type.split(' ')[0];
    const typeName = p.type.split(' ').slice(1).join(' ');
    return `
      <div class="portfolio-row">
        <span class="portfolio-type">${typeEmoji}</span>
        <div>
          <div class="portfolio-name">${p.name}</div>
          <div class="portfolio-sub">${typeName} · 원금 ${fmt(p.cost)}</div>
        </div>
        <input class="portfolio-input" type="number" value="${p.value}" placeholder="현재가" onchange="updatePortfolioValue(${p.id}, this.value)">
        <div class="portfolio-gain ${gainClass}">${gainStr}</div>
        <div class="portfolio-amount">${fmt(p.value)}</div>
        <button class="p-del-btn" onclick="deletePortfolio(${p.id})">✕</button>
      </div>`;
  }).join('');
}

function renderChart() {
  const container = document.getElementById('chart-inner');
  const tip = document.getElementById('chart-tip');

  const monthSet = [...new Set(savingsRows.map(r => r.month))].sort();
  if (!monthSet.length) {
    container.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:20px">아직 히스토리가 없어요</div>';
    return;
  }
  const maxVal = Math.max(...monthSet.flatMap(month => {
    const rows = savingsRows.filter(r => r.month === month);
    return [
      rows.filter(r => r.type === 'saving').reduce((s, r) => s + Number(r.amount || 0), 0),
      rows.filter(r => r.type === 'investment').reduce((s, r) => s + Number(r.amount || 0), 0)
    ];
  }), 1);

  container.innerHTML = monthSet.map(month => {
    const [y, mo] = month.split('-').map(Number);
    const rows = savingsRows.filter(r => r.month === month);
    const sVal = rows.filter(r => r.type === 'saving').reduce((s, r) => s + Number(r.amount || 0), 0);
    const iVal = rows.filter(r => r.type === 'investment').reduce((s, r) => s + Number(r.amount || 0), 0);
    const sH = Math.round(sVal / maxVal * 120);
    const iH = Math.round(iVal / maxVal * 120);
    const isCur = y === currentYear && mo-1 === currentMonth;
    const lbl = mo === 1 ? `${y} 1월` : `${mo}월`;
    return `
      <div class="chart-col${isCur ? ' cur' : ''}">
        <div class="chart-col-bars">
          <div class="chart-bar-s" style="height:${Math.max(sH,2)}px" data-tip="${lbl} 저축 ${fmt(sVal)}"></div>
          <div class="chart-bar-i" style="height:${Math.max(iH,2)}px" data-tip="${lbl} 투자 ${fmt(iVal)}"></div>
        </div>
        <span class="chart-mlabel">${lbl}</span>
      </div>`;
  }).join('');

  container.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', () => { tip.textContent = el.dataset.tip; tip.classList.add('show'); });
    el.addEventListener('mousemove', e => { tip.style.left = (e.clientX + 12) + 'px'; tip.style.top = (e.clientY - 36) + 'px'; });
    el.addEventListener('mouseleave', () => tip.classList.remove('show'));
  });

  container.scrollLeft = container.scrollWidth;
}

      <div class="modal-row"><label>월 투자 목표 (¥)</label><input type="number" id="t-invest" placeholder="0" min="0"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="document.getElementById('target-modal').classList.remove('open')">취소</button>

      </div>
    </div>

`);

function openTargetModal() {
  const t = getMonthlyTargets();
  document.getElementById('t-savings').value = t.savings || '';
  document.getElementById('t-invest').value = t.invest || '';
  document.getElementById('target-modal').classList.add('open');
}
function saveTargets() {
  saveMonthlyTargets({
    savings: parseFloat(document.getElementById('t-savings').value) || 0,
    invest: parseFloat(document.getElementById('t-invest').value) || 0,
  });
  document.getElementById('target-modal').classList.remove('open');
  render();
  showToast('목표가 저장됐어요!');
}

// close modals on overlay click
['goal-modal','deposit-modal','portfolio-modal','withdraw-modal','target-modal'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function setupRealtime() {
  if (realtimeChannel) return;
  realtimeChannel = supabaseClient
    .channel('savings-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'savings' }, async () => {
      await fetchSavingsRows();
      await render();
    })
    .subscribe();
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    await fetchSavingsRows();
    await render();
  }
});
window.addEventListener('focus', async () => {
  await fetchSavingsRows();
  await render();
});

initDate();
fetchSavingsRows().then(() => {
  setupRealtime();
  render();
});
</script>
