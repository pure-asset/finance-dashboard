
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생활비 정산</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --me: #ff6b9d;
    --him: #5b8dee;
    --me-soft: #fff0f5;
    --him-soft: #f0f4ff;
    --me-mid: #ffd6e7;
    --him-mid: #d0dcff;
    --shared: #a78bfa;
    --shared-soft: #f3f0ff;
    --shared-mid: #ddd6fe;
    --bg: #fdf8ff;
    --surface: #ffffff;
    --border: #f0eaf5;
    --text: #2d1f3d;
    --text2: #9b8aaa;
    --text3: #c9b8d8;
    --shadow: 0 2px 20px rgba(180,130,210,0.1);
    --shadow-hover: 0 8px 32px rgba(180,130,210,0.18);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 15% 10%, #ffedf5 0%, transparent 35%),
                      radial-gradient(circle at 85% 85%, #edf0ff 0%, transparent 35%);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 60px;
  }

  header {
    max-width: 820px; margin: 0 auto 28px;
    text-align: center; animation: fadeUp 0.5s ease both;
  }
  .header-emoji { font-size: 36px; margin-bottom: 8px; }
  header h1 { font-family: 'Gowun Dodum', sans-serif; font-size: 26px; letter-spacing: -0.3px; margin-bottom: 4px; }

  .month-nav {
    display: inline-flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 99px; padding: 8px 20px; margin-top: 16px;
    box-shadow: var(--shadow);
  }
  .month-nav button { background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 50%; transition: all 0.15s; }
  .month-nav button:hover { background: var(--border); color: var(--text); }
  .month-nav span { font-size: 15px; font-weight: 700; min-width: 90px; text-align: center; }

  .section-title {
    max-width: 820px; margin: 0 auto 12px;
    font-size: 11px; font-weight: 800; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text2);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .summary-grid {
    max-width: 820px; margin: 0 auto 28px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  }
  .sum-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; border: 1.5px solid var(--border);
    box-shadow: var(--shadow); text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .sum-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .sum-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 6px; }
  .sum-amount { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  .sum-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .sum-card.shared .sum-amount { color: var(--shared); }
  .sum-card.him-extra .sum-amount { color: var(--him); }
  .sum-card.settle-card {
    background: linear-gradient(135deg, #f0f4ff, #e8f0ff);
    border-color: var(--him-mid);
  }
  .sum-card.settle-card .sum-amount { color: var(--him); font-size: 26px; }

  .split-wrap {
    max-width: 820px; margin: 0 auto 28px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 18px 24px; box-shadow: var(--shadow);
  }
  .split-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .split-header .l { color: var(--me); }
  .split-header .r { color: var(--him); }
  .split-bar { height: 12px; background: var(--him-mid); border-radius: 99px; overflow: hidden; }
  .split-fill { height: 100%; background: linear-gradient(90deg, var(--me), #ff9bbf); border-radius: 99px; transition: width 0.6s cubic-bezier(0.34,1.2,0.64,1); }

  .shared-grid {
    max-width: 820px; margin: 0 auto 28px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }

  .shared-item {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative; transition: all 0.18s;
  }
  .shared-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .shared-item.inactive { opacity: 0.52; }

  .shared-top { display: flex; align-items: center; gap: 8px; padding-right: 28px; }
  .shared-emoji { font-size: 20px; }
  .shared-name { font-size: 13px; font-weight: 600; }

  .shared-input {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 7px 10px;
    font-size: 13px; font-family: inherit; outline: none; width: 100%;
    font-weight: 700; transition: border-color 0.15s;
  }
  .shared-input:focus { border-color: var(--shared); box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }
  .shared-input:disabled { cursor: not-allowed; }

  .shared-each-label { font-size: 10px; color: var(--shared); font-weight: 700; min-height: 14px; }

  .skip-badge {
    font-size: 9px; font-weight: 700; color: var(--text3);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 99px; padding: 1px 7px; display: inline-block; width: fit-content;
  }

  .toggle-wrap {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 2;
  }
  .mini-toggle {
    -webkit-appearance: none;
    appearance: none;
    display: inline-block;
    vertical-align: top;
    position: relative;
    width: 36px;
    height: 20px;
    min-width: 36px;
    min-height: 20px;
    padding: 0;
    margin: 0;
    border: none;
    outline: none;
    border-radius: 999px;
    cursor: pointer;
    background: #e8e1f6;
    box-shadow: inset 0 0 0 1px rgba(167, 139, 250, 0.18);
    transition: background 0.18s ease, box-shadow 0.18s ease;
    overflow: hidden;
  }
  .mini-toggle.active {
    background: #a78bfa;
    box-shadow: inset 0 0 0 1px rgba(122, 98, 155, 0.08);
  }
  .mini-toggle-circle {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 800;
    line-height: 1;
    color: #b8adc9;
    box-shadow: 0 1px 3px rgba(53, 27, 78, 0.16);
    transition: transform 0.18s ease, color 0.18s ease;
    pointer-events: none;
  }
  .mini-toggle.active .mini-toggle-circle {
    transform: translateX(16px);
    color: #9b87f5;
  }

  .him-section { max-width: 820px; margin: 0 auto 28px; }

  .him-add-row {
    display: grid; grid-template-columns: 1fr 130px auto;
    gap: 10px; margin-bottom: 12px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow);
  }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 11px; color: var(--text2); font-weight: 700; letter-spacing: 0.04em; }
  .fg input {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); padding: 10px 14px;
    font-size: 13px; font-family: inherit; outline: none; width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .fg input:focus { border-color: var(--him); box-shadow: 0 0 0 3px rgba(91,141,238,0.1); }

  .add-btn {
    background: linear-gradient(135deg, var(--him), #7aaeff);
    color: #fff; border: none; border-radius: 12px;
    padding: 10px 20px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
    font-family: inherit; box-shadow: 0 4px 12px rgba(91,141,238,0.3);
    align-self: flex-end;
  }
  .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .him-items { display: flex; flex-direction: column; gap: 8px; }

  .him-card {
    background: var(--surface); border: 1.5px solid var(--him-mid);
    border-left: 4px solid var(--him); border-radius: 14px;
    padding: 14px 16px; display: grid;
    grid-template-columns: 1fr auto auto; align-items: center; gap: 12px;
    box-shadow: var(--shadow); transition: all 0.18s;
  }
  .him-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .him-card-desc { font-size: 14px; font-weight: 600; }
  .him-card-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .him-card-amount { font-size: 16px; font-weight: 900; color: var(--him); }
  .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; border-radius: 8px; padding: 4px 6px; transition: all 0.15s; }
  .del-btn:hover { color: var(--me); background: var(--me-soft); }

  .him-empty {
    text-align: center; padding: 28px; color: var(--text3); font-size: 13px;
    background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius);
  }

  .settle-banner {
    max-width: 820px; margin: 8px auto 0;
    border-radius: var(--radius); padding: 24px 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 100%);
    border: 1.5px solid var(--him-mid);
    box-shadow: 0 8px 32px rgba(91,141,238,0.15);
  }
  .settle-msg { font-size: 15px; font-weight: 700; line-height: 1.6; }
  .settle-msg .h-him { color: var(--him); }
  .settle-msg .h-me { color: var(--me); }
  .settle-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .settle-big { font-size: 32px; font-weight: 900; letter-spacing: -1px; color: var(--him); white-space: nowrap; }

  .sync-note {
    max-width: 820px; margin: 12px auto 0; text-align: center;
    font-size: 12px; color: var(--text2);
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  input, select, textarea, button { font-size: 16px !important; }
  input, select, button { min-height: 44px; }
  input[type="number"] { font-size: 16px; }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .shared-grid { grid-template-columns: 1fr 1fr; }
    .him-add-row { grid-template-columns: 1fr 110px; }
    .him-add-row .add-btn { grid-column: 1/-1; }
    .settle-banner { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-emoji">🏠💑</div>
  <h1>생활비 정산</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="month-title"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
</header>

<div class="section-title">이번 달 요약</div>
<div class="summary-grid">
  <div class="sum-card shared">
    <div class="sum-label">공동 생활비 합계</div>
    <div class="sum-amount" id="shared-total">¥0</div>
    <div class="sum-sub">각자 부담 → <strong id="shared-each-top">¥0</strong></div>
  </div>
  <div class="sum-card him-extra">
    <div class="sum-label">남친 청구 항목</div>
    <div class="sum-amount" id="him-extra-total">¥0</div>
    <div class="sum-sub" id="him-extra-count">0건</div>
  </div>
  <div class="sum-card settle-card">
    <div class="sum-label">💙 남친이 줄 총액</div>
    <div class="sum-amount" id="him-owes-total">¥0</div>
    <div class="sum-sub">반반 + 청구 항목</div>
  </div>
</div>

<div class="split-wrap">
  <div class="split-header">
    <span class="l">🩷 내 부담 <span id="me-pct">50</span>%</span>
    <span class="r"><span id="him-pct">50</span>% 남친 부담 💙</span>
  </div>
  <div class="split-bar"><div class="split-fill" id="split-fill" style="width:50%"></div></div>
</div>

<div class="section-title">🏠 공동 생활비 — 반반 부담</div>
<div class="shared-grid" id="shared-grid"></div>

<div class="section-title">💙 남친 청구 항목</div>
<div class="him-section">
  <div class="him-add-row">
    <div class="fg">
      <label>항목</label>
      <input type="text" id="him-desc" placeholder="예: 지난번 저녁 밥값">
    </div>
    <div class="fg">
      <label>금액 (¥)</label>
      <input type="number" id="him-amount" placeholder="0" min="0">
    </div>
    <button class="add-btn" onclick="addHimItem()">+ 추가</button>
  </div>
  <div class="him-items" id="him-items"></div>
</div>

<div class="settle-banner">
  <div>
    <div class="settle-msg" id="settle-msg">항목을 채우면 정산액이 나와요 🏠</div>
    <div class="settle-sub" id="settle-sub">공동 생활비 금액을 위에서 입력해보세요</div>
  </div>
  <div class="settle-big" id="settle-big">¥0</div>
</div>
<div class="sync-note">이 화면은 Supabase와 실시간 연결됩니다.</div>

<script>
const SUPABASE_URL = 'https://plmzikgawehuegvbdcpx.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_lW-g-NljRVO4Ym2mp3eUQw_BbHcz3Ch';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
const TABLE_NAME = 'shared_expense';

const SHARED_DEF = [
  { key: 'rent',       name: '집세',        emoji: '🏠', bimonthly: false },
  { key: 'water',      name: '수도세',      emoji: '🚿', bimonthly: true  },
  { key: 'electric',   name: '전기세',      emoji: '💡', bimonthly: false },
  { key: 'internet',   name: '인터넷',      emoji: '📶', bimonthly: false },
  { key: 'gas',        name: '가스사용료',  emoji: '🔥', bimonthly: false },
  { key: 'netflix',    name: '넷플릭스',    emoji: '🎬', bimonthly: false },
  { key: 'amazon',     name: '아마존 프라임', emoji: '📦', bimonthly: false },
  { key: 'disney',     name: '디즈니플러스', emoji: '🏰', bimonthly: false },
  { key: 'essentials', name: '생필품 쇼핑', emoji: '🛒', bimonthly: false },
];

let currentYear;
let currentMonth;
let monthRows = [];
let realtimeChannel = null;

function initDate() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
}

function monthKey() {
  return `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
}

function fmt(n) {
  return '¥' + Math.abs(Math.round(Number(n || 0))).toLocaleString('ja-JP');
}

function findRow(category) {
  return monthRows.find(row => row.category === category) || null;
}

function getAmounts() {
  const amounts = {};
  SHARED_DEF.forEach(def => {
    const row = findRow(def.key);
    amounts[def.key] = row ? Number(row.amount || 0) : 0;
  });
  return amounts;
}

function getEnabled() {
  const enabled = {};
  SHARED_DEF.forEach(def => {
    const row = findRow(def.key);
    if (row) {
      enabled[def.key] = !!row.enabled;
    } else {
      enabled[def.key] = def.bimonthly ? (currentMonth % 2 === 0) : true;
    }
  });
  return enabled;
}

function getHimItems() {
  return monthRows
    .filter(row => row.category === 'him_charge')
    .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
}

async function loadMonthData() {
  const { data, error } = await supabaseClient
    .from(TABLE_NAME)
    .select('*')
    .eq('month', monthKey())
    .order('created_at', { ascending: true });

  if (error) {
    alert('생활비 데이터를 불러오지 못했어요: ' + error.message);
    return;
  }

  monthRows = data || [];
  render();
}

async function upsertSharedCategory(category, nextFields) {
  const existing = findRow(category);
  const payload = {
    month: monthKey(),
    category,
    amount: Number(nextFields.amount ?? existing?.amount ?? 0),
    enabled: Boolean(nextFields.enabled ?? existing?.enabled ?? true),
    memo: nextFields.memo ?? existing?.memo ?? null,
    synced: Boolean(nextFields.synced ?? existing?.synced ?? false),
    personal_tx_id: nextFields.personal_tx_id ?? existing?.personal_tx_id ?? null,
  };

  let error;
  if (existing) {
    ({ error } = await supabaseClient
      .from(TABLE_NAME)
      .update(payload)
      .eq('id', existing.id));
  } else {
    ({ error } = await supabaseClient
      .from(TABLE_NAME)
      .insert(payload));
  }

  if (error) {
    alert('저장에 실패했어요: ' + error.message);
    return false;
  }
  await loadMonthData();
  return true;
}

async function toggleShared(key) {
  const existing = findRow(key);
  const currentEnabled = existing ? !!existing.enabled : (SHARED_DEF.find(def => def.key === key)?.bimonthly ? (currentMonth % 2 === 0) : true);
  await upsertSharedCategory(key, {
    enabled: !currentEnabled,
    amount: existing ? Number(existing.amount || 0) : 0,
  });
}

let updateTimers = {};
function updateAmount(key, val) {
  clearTimeout(updateTimers[key]);
  updateTimers[key] = setTimeout(async () => {
    const numeric = Number(val || 0);
    const existing = findRow(key);
    const enabled = existing ? !!existing.enabled : (SHARED_DEF.find(def => def.key === key)?.bimonthly ? (currentMonth % 2 === 0) : true);
    await upsertSharedCategory(key, {
      amount: Number.isFinite(numeric) ? numeric : 0,
      enabled,
    });
  }, 250);
}

async function addHimItem() {
  const desc = document.getElementById('him-desc').value.trim();
  const amount = Number(document.getElementById('him-amount').value);
  if (!desc || !amount || amount <= 0) {
    alert('항목과 금액을 입력해주세요!');
    return;
  }

  const { error } = await supabaseClient
    .from(TABLE_NAME)
    .insert({
      month: monthKey(),
      category: 'him_charge',
      amount,
      enabled: true,
      memo: desc,
      synced: false,
      personal_tx_id: null,
    });

  if (error) {
    alert('청구 항목 저장에 실패했어요: ' + error.message);
    return;
  }

  document.getElementById('him-desc').value = '';
  document.getElementById('him-amount').value = '';
  await loadMonthData();
}

async function deleteHimItem(id) {
  const { error } = await supabaseClient
    .from(TABLE_NAME)
    .delete()
    .eq('id', id);

  if (error) {
    alert('삭제에 실패했어요: ' + error.message);
    return;
  }

  await loadMonthData();
}

function renderSharedGrid() {
  const amounts = getAmounts();
  const enabled = getEnabled();
  const grid = document.getElementById('shared-grid');
  grid.innerHTML = '';

  SHARED_DEF.forEach(def => {
    const isOn = !!enabled[def.key];
    const amountValue = amounts[def.key] || 0;
    const each = (isOn && amountValue > 0) ? fmt(amountValue / 2) : '';

    const div = document.createElement('div');
    div.className = 'shared-item' + (isOn ? '' : ' inactive');
    div.innerHTML = `
      <div class="toggle-wrap">
        <button class="mini-toggle ${isOn ? 'active' : ''}" type="button" aria-label="${def.name} ${isOn ? '포함' : '제외'}" onclick="toggleShared('${def.key}')">
          <span class="mini-toggle-circle">${isOn ? '✔' : '✕'}</span>
        </button>
      </div>
      <div class="shared-top">
        <span class="shared-emoji">${def.emoji}</span>
        <span class="shared-name">${def.name}</span>
      </div>
      ${def.bimonthly ? '<span class="skip-badge">격월 · 홀수달</span>' : ''}
      <input class="shared-input" type="number" placeholder="금액 입력" value="${amountValue > 0 ? amountValue : ''}"
        ${isOn ? '' : 'disabled'}
        oninput="updateAmount('${def.key}', this.value)">
      <div class="shared-each-label" id="each-${def.key}">${each ? '각자 ' + each : ''}</div>
    `;
    grid.appendChild(div);
  });
}

function renderHimItems() {
  const items = getHimItems();
  const container = document.getElementById('him-items');
  if (!items.length) {
    container.innerHTML = '<div class="him-empty">💙 남친에게 청구할 항목을 추가해보세요</div>';
    return;
  }

  container.innerHTML = items.map(item => `
    <div class="him-card">
      <div>
        <div class="him-card-desc">${item.memo || '청구 항목'}</div>
        <div class="him-card-meta">${currentYear}년 ${currentMonth + 1}월</div>
      </div>
      <div class="him-card-amount">${fmt(item.amount)}</div>
      <button class="del-btn" onclick="deleteHimItem('${item.id}')">✕</button>
    </div>
  `).join('');
}

function recalc() {
  const amounts = getAmounts();
  const enabled = getEnabled();
  const himItems = getHimItems();

  let sharedTotal = 0;
  SHARED_DEF.forEach(def => {
    if (enabled[def.key] && amounts[def.key]) {
      sharedTotal += Number(amounts[def.key] || 0);
    }
    const el = document.getElementById('each-' + def.key);
    if (el) {
      el.textContent = (enabled[def.key] && amounts[def.key] > 0)
        ? '각자 ' + fmt(amounts[def.key] / 2)
        : '';
    }
  });

  const sharedEach = sharedTotal / 2;
  const himExtra = himItems.reduce((sum, item) => sum + Number(item.amount || 0), 0);
  const himOwes = sharedEach + himExtra;

  document.getElementById('shared-total').textContent = fmt(sharedTotal);
  document.getElementById('shared-each-top').textContent = fmt(sharedEach);
  document.getElementById('him-extra-total').textContent = fmt(himExtra);
  document.getElementById('him-extra-count').textContent = himItems.length + '건';
  document.getElementById('him-owes-total').textContent = fmt(himOwes);

  const total = sharedEach + himOwes;
  const myPct = total > 0 ? Math.round(sharedEach / total * 100) : 50;
  document.getElementById('split-fill').style.width = myPct + '%';
  document.getElementById('me-pct').textContent = myPct;
  document.getElementById('him-pct').textContent = 100 - myPct;

  if (himOwes === 0) {
    document.getElementById('settle-msg').innerHTML = '아직 금액이 없어요 🏠';
    document.getElementById('settle-sub').textContent = '공동 생활비 금액을 위에서 입력해보세요';
    document.getElementById('settle-big').textContent = '¥0';
  } else {
    document.getElementById('settle-msg').innerHTML = `남친이 이번 달 <span class="h-him">${fmt(himOwes)}</span> 낼 차례예요 💙`;
    const parts = [];
    if (sharedEach > 0) parts.push(`공동 반반 ${fmt(sharedEach)}`);
    if (himExtra > 0) parts.push(`청구 항목 ${fmt(himExtra)}`);
    document.getElementById('settle-sub').textContent = parts.join(' + ');
    document.getElementById('settle-big').textContent = fmt(himOwes);
  }
}

function render() {
  document.getElementById('month-title').textContent = `${currentYear}년 ${currentMonth + 1}월`;
  renderSharedGrid();
  renderHimItems();
  recalc();
}

async function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear -= 1; }
  if (currentMonth > 11) { currentMonth = 0; currentYear += 1; }
  await loadMonthData();
}

function setupRealtime() {
  if (realtimeChannel) return;
  realtimeChannel = supabaseClient
    .channel('shared-expense-realtime')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: TABLE_NAME,
    }, async () => {
      await loadMonthData();
    })
    .subscribe();
}

window.addEventListener('focus', loadMonthData);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadMonthData();
});

initDate();
setupRealtime();
loadMonthData();
</script>
</body>
</html>
